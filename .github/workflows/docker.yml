name: Docker Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ----------------------------------------------------------------
  # Job 1: Build, Test & Push
  # ----------------------------------------------------------------
  build:
    name: Build, Test & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Step 1: Build & Load (Local Arch Only) for Smoke Test
      - name: Build and Load (Single Arch)
        uses: docker/build-push-action@v5
        with:
          context: MT5
          push: false
          load: true
          tags: mt5-terminal:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 2: Smoke test
      - name: Smoke test — container starts
        run: |
          docker run -d \
            --name mt5-terminal-test \
            -p 18812:18812 \
            -p 5900:5900 \
            -e MT5_LOGIN=123456 \
            -e MT5_PASSWORD=test \
            -e MT5_SERVER=MetaQuotes-Demo \
            mt5-terminal:ci

          echo "Waiting for container to be ready..."
          sleep 20
          
          if [ "$(docker inspect -f '{{.State.Running}}' mt5-terminal-test)" = "true" ]; then
             echo "✅ Container is running"
          else
             echo "❌ Container failed to start"
             docker logs mt5-terminal-test
             exit 1
          fi

          docker logs mt5-terminal-test | grep -q "supervisord started" && echo "✅ Supervisord started" || echo "⚠️ Supervisord startup check failed"

      - name: Cleanup container
        if: always()
        run: docker rm -f mt5-terminal-test || true

      # Step 3: Build & Push (AMD64 only as per original)
      - name: Build and Push
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: docker/build-push-action@v5
        with:
          context: MT5
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
