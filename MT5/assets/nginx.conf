user root;
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stdout info;

events {
    worker_connections 768;
}

http {
    access_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 6901 default_server;

        # Auto-connect: skip the connect form and go straight to the VNC viewer
        location = / {
            return 302 /vnc.html?path=vnc&autoconnect=true&resize=remote&reconnect=true&show_dot=true;
        }

        location / {
            # auth_basic "Restricted Access";
            # auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://localhost:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # noVNC defaults to /websockify but easy-novnc serves its WebSocket proxy at /vnc
        location = /websockify {
            proxy_pass http://localhost:8080/vnc;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }
    }
}
