services:
  mt5-terminal:
    build: .
    image: ghcr.io/damaticai/metatrader-terminal:socket-v1
    ports:
      - "6901:6901"
      - "127.0.0.1:18812:18812"
    environment:
      VNC_USER: ${VNC_USER:-"mt5_user"}
      VNC_PASSWORD: ${VNC_PASSWORD:-"password"}
      MT5_LOGIN: ${MT5_LOGIN:-0}
      MT5_SOCKET_HOST: 0.0.0.0
      MT5_SOCKET_PORT: ${MT5_SOCKET_PORT:-18812}
      MT5_PASSWORD: ${MT5_PASSWORD:-"password"}
      MT5_SERVER: ${MT5_SERVER:-"MetaTrader-Demo"}
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1G
        reservations:
          memory: 512M
